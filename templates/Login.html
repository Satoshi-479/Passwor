<!DOCTYPE html>
<html>
<head>
    <title>SafeVault Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: none; border-radius: 5px; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 SafeVault</h2>
        <p>Enter Master Password</p>
        <form action="/login" method="POST">
            <input type="password" name="master_password" placeholder="Password" required>
            <button type="submit">Unlock Vault</button>
        </form>
    </div>
</body>
</html>
